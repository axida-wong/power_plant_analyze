<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>火电厂设备实时监测系统 - 主界面</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        /* 修改变量为明亮配色 */
        :root { 
            --bg: #f4f7f6;      /* 背景色：淡灰白 */
            --card: #ffffff;    /* 卡片色：纯白 */
            --accent: #007bff;  /* 强调色：科技蓝 */
            --text: #333333;    /* 主文字色 */
            --border: #e0e0e0;  /* 边框色 */
        }
        
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'PingFang SC', 'Microsoft YaHei'; overflow: hidden; }
        
        /* 布局容器 */
        .dashboard { display: grid; grid-template-columns: 240px 1fr; grid-template-rows: 1fr 220px; height: 100vh; gap: 12px; padding: 12px; box-sizing: border-box; }
        .panel { background: var(--card); border: 1px solid var(--border); border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        
        /* 侧边栏 */
        .sidebar { grid-row: 1 / 3; padding: 15px; }
        h4 { margin: 0 0 15px 0; color: #555; font-size: 14px; border-left: 3px solid var(--accent); padding-left: 8px; }
        .channel-group { flex: 1; overflow-y: auto; }
        .btn { width: 100%; background: #f8f9fa; border: 1px solid #ddd; color: #666; padding: 12px; margin-bottom: 8px; cursor: pointer; text-align: left; border-radius: 4px; font-size: 13px; transition: all 0.2s; }
        .btn:hover { border-color: var(--accent); color: var(--accent); background: #fff; }
        .btn.active { background: var(--accent); color: #fff; font-weight: bold; border-color: var(--accent); box-shadow: 0 3px 6px rgba(0,123,255,0.2); }
        
        .nav-link { background: #fff; border: 1px solid var(--accent); color: var(--accent); padding: 12px; text-align: center; text-decoration: none; border-radius: 4px; font-weight: bold; margin-top: 10px; transition: 0.3s; }
        .nav-link:hover { background: var(--accent); color: #fff; }

        /* 主显示区 */
        .monitor-view { padding: 10px; display: flex; flex-direction: column; gap: 10px; }
        .chart-container { flex: 1; min-height: 0; border: 1px solid #f0f0f0; background: #fff; border-radius: 4px; position: relative; }
        .chart { position: absolute; top:0; left:0; right:0; bottom:0; }

        /* 底部 */
        .summary-view { grid-column: 2; display: grid; grid-template-columns: 1fr 300px; gap: 12px; }
        .history-table-box { background: #fff; padding: 10px; border-radius: 6px; border: 1px solid var(--border); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .status-cards { display: grid; grid-template-rows: 1fr 1fr; gap: 10px; }
        .stat-card { background: #fff; border-left: 4px solid var(--accent); padding: 15px; display: flex; flex-direction: column; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .stat-label { font-size: 11px; color: #888; text-transform: uppercase; }
        .stat-val { font-size: 26px; font-weight: bold; color: var(--accent); font-family: 'Consolas', monospace; }

        /* 表格样式 */
        table { width: 100%; border-collapse: collapse; font-size: 12px; color: #444; }
        th { text-align: left; padding: 8px; border-bottom: 2px solid #eee; color: #888; }
        td { padding: 8px; border-bottom: 1px solid #f9f9f9; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="panel sidebar">
        <h4>📡 监测点 (实时)</h4>
        <div id="channel-list" class="channel-group"></div>
        <h4>⚙️ 系统操作</h4>
        <a href="/analysis" class="nav-link">进入辅助分析界面 ➔</a>
        <a href="/ai_report" class="nav-link" style="border-color: #52c41a; color: #52c41a; margin-top: 8px;">📊 边缘AI高级专家诊断 ➔</a>
    </div>

    <div class="panel monitor-view">
        <div class="chart-container"><div id="waveChart" class="chart"></div></div>
        <div class="chart-container"><div id="fftChart" class="chart"></div></div>
    </div>

    <div class="summary-view">
        <div class="history-table-box">
            <h4>📊 近期异常统计</h4>
            <table>
                <thead>
                    <tr><th>发生时间</th><th>设备位置</th><th>报警类型</th><th>振动峰值</th></tr>
                </thead>
                <tbody id="stat-table-body">
                    <tr><td>2026-05-11 23:10</td><td>1#机组轴承</td><td>频率偏移</td><td>6.82 mm/s</td></tr>
                    <tr><td>2026-05-11 22:45</td><td>2#送风机</td><td>幅值超限</td><td>5.12 mm/s</td></tr>
                </tbody>
            </table>
        </div>
        <div class="status-cards">
            <div class="stat-card">
                <span class="stat-label">当前运行有效值 (RMS)</span>
                <span class="stat-val" id="rms-val">0.000</span>
            </div>
            <div class="stat-card" style="border-color: #ff4d4f;">
                <span class="stat-label">今日累计异常触发</span>
                <span class="stat-val" id="err-val" style="color: #ff4d4f;">0</span>
            </div>
        </div>
    </div>
</div>

<script>
    const aliasMap = {
        "9232/ai0": "1#发电机-驱动端振动",
        "9232/ai1": "1#发电机-非驱动端振动",
        "9232/ai2": "2#引风机-机壳振动",
        "9250/ai0": "汽轮机-主油泵压力",
        "9250/ai1": "汽轮机-2号轴瓦压力"
    };

    let activeId = null;
    let alarmCount = 0;
    
    // 初始化 ECharts，将 'dark' 改为 null 或 'light'
    const waveChart = echarts.init(document.getElementById('waveChart'));
    const fftChart = echarts.init(document.getElementById('fftChart'));

    const baseOpt = { 
        backgroundColor: 'transparent', 
        animation: false, 
        grid: { top: 40, bottom: 30, left: 50, right: 20 } 
    };

    function initCharts() {
        waveChart.setOption({
            ...baseOpt, 
            title: { text: '时域原始波形', textStyle:{fontSize:14, color:'#666'} },
            xAxis: { type: 'category', show: false },
            yAxis: { scale: true, splitLine: { lineStyle: { color: '#f0f0f0' } } },
            series: [{ type: 'line', data: [], symbol: 'none', lineStyle: { width: 1.5, color: '#007bff' } }]
        });
        fftChart.setOption({
            ...baseOpt, 
            title: { text: '频域能量分布 (FFT)', textStyle:{fontSize:14, color:'#666'} },
            xAxis: { type: 'category', axisLabel: { fontSize: 10, color: '#999' } },
            yAxis: { scale: true, splitLine: { lineStyle: { color: '#f0f0f0' } } },
            series: [{ type: 'bar', data: [], itemStyle: { color: '#fa8c16' } }]
        });
    }

    function connect() {
        const ws = new WebSocket(`ws://${location.host}/ws`);
        ws.onmessage = (e) => {
            const data = JSON.parse(e.data);
            
            if(!document.getElementById('btn-' + data.id)) {
                const btn = document.createElement('button');
                btn.className = 'btn'; btn.id = 'btn-' + data.id;
                btn.innerText = aliasMap[data.id] || data.id;
                btn.onclick = () => { 
                    activeId = data.id; 
                    document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                };
                document.getElementById('channel-list').appendChild(btn);
            }
            if(!activeId) { activeId = data.id; document.getElementById('btn-'+data.id).classList.add('active'); }

            if(activeId === data.id) {
                document.getElementById('rms-val').innerText = data.rms.toFixed(3);
                waveChart.setOption({ series: [{ data: data.wave }] });
                fftChart.setOption({ series: [{ data: data.fft }] });

                if(data.diag_level !== 'ok') {
                    alarmCount++;
                    document.getElementById('err-val').innerText = alarmCount;
                }
            }
        };
        ws.onopen = () => initCharts();
    }

    connect();
    window.onresize = () => { waveChart.resize(); fftChart.resize(); };
</script>
</body>
</html>
